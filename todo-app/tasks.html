<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks - Todo List App</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav>
        <ul>
            <li><a href="register.html">Register</a></li>
            <li><a href="login.html">Login</a></li>
            <li><a href="tasks.html">Tasks</a></li>
        </ul>
    </nav>
    
    <div class="container">
        <h1><i class="fas fa-tasks"></i> My Tasks</h1>
        
        <img src="https://images.unsplash.com/photo-1484480974693-6ca0a78fb36b?w=800&h=300&fit=crop" alt="Task Management" class="hero-image">
        
        <div class="form-section">
            <h2>Create a New Task</h2>
            <form>
                <label for="taskText">Task Description:</label>
                <textarea id="taskText" name="taskText" placeholder="Enter your task here..." required></textarea>
                
                <input type="submit" value="Add Task">
            </form>
        </div>
        
        <div class="task-list">
            <h2>Your Tasks</h2>
            
            <div class="task-item">
                <div class="task-text">
                    <strong>Sample Task 1</strong><br>
                    <small>Complete project documentation</small>
                </div>
                <div class="task-actions">
                    <button class="edit-btn">Edit</button>
                    <button class="delete-btn">Delete</button>
                </div>
            </div>
            
            <div class="task-item">
                <div class="task-text">
                    <strong>Sample Task 2</strong><br>
                    <small>Review code changes</small>
                </div>
                <div class="task-actions">
                    <button class="edit-btn">Edit</button>
                    <button class="delete-btn">Delete</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
